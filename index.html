<!DOCTYPE html>
<html>
<head>
    <title>Pattern Perception Study</title>
<script src="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/dist/index.browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-button-response@1.1.3/dist/index.browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-text@1.1.3/dist/index.browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-likert@1.1.3/dist/index.browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/css/jspsych.css">
    <style>
        .jspsych-content {
            max-width: 800px;
        }
        .trial-image {
            width: 400px;
            height: 400px;
            object-fit: contain;
            display: block;
            margin: 0 auto 20px auto;
            border: 1px solid #ccc;
        }
        .trial-button {
            display: block;
            width: 420px;
            margin: 10px auto;
            padding: 12px 24px;
            font-size: 15px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 2px solid #999;
            border-radius: 5px;
        }
        .level-counter {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .response-box {
            display: block;
            width: 400px;
            height: 100px;
            margin: 10px auto;
            font-size: 15px;
            padding: 8px;
        }
    </style>
</head>
<body></body>
<script>

// -------------------------------------------------------
// STUDY CONFIGURATION
// -------------------------------------------------------

var baseURL = "https://eriklandhuis.github.io/loss-of-control/images";

// Define all 20 trials (10 hit, 10 fa)
var allTrials = [
    {condition: "hit", set: "01"},
    {condition: "hit", set: "02"},
    {condition: "hit", set: "03"},
    {condition: "hit", set: "04"},
    {condition: "hit", set: "05"},
    {condition: "hit", set: "06"},
    {condition: "hit", set: "07"},
    {condition: "hit", set: "08"},
    {condition: "hit", set: "09"},
    {condition: "hit", set: "10"},
    {condition: "fa", set: "01"},
    {condition: "fa", set: "02"},
    {condition: "fa", set: "03"},
    {condition: "fa", set: "04"},
    {condition: "fa", set: "05"},
    {condition: "fa", set: "06"},
    {condition: "fa", set: "07"},
    {condition: "fa", set: "08"},
    {condition: "fa", set: "09"},
    {condition: "fa", set: "10"}
];

// Shuffle the trials randomly
function shuffleArray(array) {
    var arr = array.slice();
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
    }
    return arr;
}

var shuffledTrials = shuffleArray(allTrials);

// -------------------------------------------------------
// INITIALISE JSPSYCH
// -------------------------------------------------------

var jsPsych = jsPsychModule.initJsPsych({
    on_finish: function() {
        // Data will be sent to JATOS - for now just show it
        jsPsych.data.displayData();
    }
});

// -------------------------------------------------------
// BUILD THE TIMELINE
// -------------------------------------------------------

var timeline = [];

// -------------------------------------------------------
// WELCOME SCREEN
// -------------------------------------------------------

var welcome = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<h2>Welcome to the Pattern Perception Study</h2>' +
              '<p>Thank you for taking the time to participate in this study.</p>' +
              '<p>Please click the button below to begin.</p>',
    choices: ['Begin']
};

timeline.push(welcome);

// -------------------------------------------------------
// SNOWY PICTURES INSTRUCTIONS
// -------------------------------------------------------

var snowy_instructions = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<h2>Image Task Instructions</h2>' +
              '<p>In this part of the study, you will be shown a series of images.</p>' +
              '<p>Each image will start off very unclear and gradually become clearer.</p>' +
              '<p>For each image, please select:</p>' +
              '<ul style="text-align:left;">' +
              '<li><b>"I can\'t see anything"</b> if you cannot make out what the image shows</li>' +
              '<li><b>"I think I know what is shown"</b> if you think you can identify what is in the image</li>' +
              '</ul>' +
              '<p>When you think you know what is shown, you will be asked to type what you saw.</p>' +
              '<p>There are 20 image sets in total.</p>',
    choices: ['Start Image Task']
};

timeline.push(snowy_instructions);

// -------------------------------------------------------
// SNOWY PICTURES TRIALS
// -------------------------------------------------------

// Build a trial for each of the 20 shuffled trials
for (var t = 0; t < shuffledTrials.length; t++) {

    // Use a closure to capture the trial variables correctly
    (function(trialInfo, trialNumber) {

        var snowy_trial = {
            type: jsPsychHtmlButtonResponse,
            stimulus: function() { return '<p id="trial-instruction" style="font-size:16px;">Please look carefully at the image below. Select the option that best describes what you see.</p>' +
                '<img id="trial-image" class="trial-image" src="' + baseURL + '/' + trialInfo.condition + '/' + trialInfo.condition + '_st' + trialInfo.set + '_lvl20.png" />' +
                '<p id="level-counter" class="level-counter">Image 1 of 20</p>'; },
            choices: ["I can't see anything. Please show me the next image.", "I think I know what is shown in the image."],
            button_html: '<button class="trial-button">%choice%</button>',
            data: {
                trial_number: trialNumber,
                condition: trialInfo.condition,
                set: trialInfo.set,
                threshold: null,
                response_text: ''
            },
            on_load: function() {

                var currentLevel = 20;
                var clickCount = 0;
                var trialData = jsPsych.getCurrentTrial().data;

                function showImage(level) {
                    var lvl = (level < 10) ? "0" + level : "" + level;
                    var imageURL = baseURL + "/" + trialInfo.condition + "/" +
                        trialInfo.condition + "_st" + trialInfo.set + "_lvl" + lvl + ".png";
                    document.getElementById("trial-image").src = imageURL;
                    var viewed = 21 - level;
                    document.getElementById("level-counter").innerHTML = "Image " + viewed + " of 20";
                }
                
                // Override button 1 (I can't see anything)
                var buttons = document.querySelectorAll(".trial-button");

                buttons[0].addEventListener("click", function(e) {
                    e.stopImmediatePropagation();
                    clickCount++;
                    currentLevel--;

                    if (currentLevel < 1) {
                        // Seen all 20 images
                        trialData.threshold = 20;
                        trialData.response_text = "";
                        document.getElementById("trial-instruction").innerHTML =
                            "You have viewed all the images for this trial.";
                        buttons[0].style.display = "none";
                        buttons[1].style.display = "none";
                        // Auto advance after short delay
                        setTimeout(function() {
                            jsPsych.finishTrial();
                        }, 1000);
                    } else {
                        showImage(currentLevel);
                    }
                }, true);
               
                // Override button 2 (I think I know)
                buttons[1].addEventListener("click", function(e) {
                    e.stopImmediatePropagation();
                    trialData.threshold = clickCount;

                    // Hide buttons and show response box
                    buttons[0].style.display = "none";
                    buttons[1].style.display = "none";

                    var responseHTML = '<p style="font-size:16px; text-align:center;">Please type what you think you saw in the box below:</p>' +
                        '<textarea id="response-text" class="response-box"></textarea><br>' +
                        '<button class="trial-button" id="btn-next" style="display:block; margin: 10px auto;">Please take me to the next trial.</button>';

                    var responseDiv = document.createElement("div");
                    responseDiv.innerHTML = responseHTML;
                    document.querySelector(".jspsych-html-button-response-stimulus").appendChild(responseDiv);

                    document.getElementById("btn-next").addEventListener("click", function() {
                        trialData.response_text = document.getElementById("response-text").value;
                        jsPsych.finishTrial();
                    });
                }, true);
            }
        };

        timeline.push(snowy_trial);

    })(shuffledTrials[t], t + 1);
}

// -------------------------------------------------------
// RUN THE STUDY
// -------------------------------------------------------

jsPsych.run(timeline);

</script>
</html>
